<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    body { background: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2rem;
      width: min(400px, 92vw);
      color: #f1f5f9;
    }
    .login-logo { font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; }
    .login-title { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
    .login-sub { color: #94a3b8; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem; }
    .login-card .form-label { color: #cbd5e1; }
    .login-card .form-input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
    .login-card .form-input:focus { border-color: #2563eb; }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .err-msg { color: #f87171; font-size: 0.85rem; margin-top: 0.75rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <div class="login-title">ระบบสแกนหน้าเข้างาน</div>
    <div class="login-sub">สำหรับผู้ดูแลระบบเท่านั้น</div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">ชื่อผู้ใช้</label>
        <input type="text" id="username" class="form-input" placeholder="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="login-btn">เข้าสู่ระบบ</button>
      <div class="err-msg" id="err-msg"></div>
    </form>
  </div>
  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem("admin_token")) {
      window.location.href = "/admin/dashboard.html";
    }
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      const errEl = document.getElementById("err-msg");
      btn.disabled = true;
      btn.textContent = "กำลังเข้าสู่ระบบ...";
      errEl.style.display = "none";
      try {
        const res = await API.login(
          document.getElementById("username").value,
          document.getElementById("password").value
        );
        sessionStorage.setItem("admin_token", res.access_token);
        sessionStorage.setItem("admin_name", res.admin_name);
        sessionStorage.setItem("is_superadmin", res.is_superadmin);
        window.location.href = "/admin/dashboard.html";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "เข้าสู่ระบบ";
      }
    });
  </script>
</body>
</html>
